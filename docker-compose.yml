version: '3.8'

services:
  # Infrastructure Services (using cloud services)
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: omnimind-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__LOG__LEVEL: INFO
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-omnimind-dev-key}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - omnimind-network

  # Application Services
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: omnimind-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - POSTGRES_URL=${POSTGRES_URL}
      - REDIS_URL=${REDIS_URL}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - AI_SERVICE_URL=http://ai-service:3002
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
      - STORAGE_TYPE=cloudinary
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - uploads:/app/storage/uploads
      - clips:/app/storage/clips
    networks:
      - omnimind-network
    command: pnpm run dev

  ai-service:
    build:
      context: .
      dockerfile: apps/ai-service/Dockerfile
    container_name: omnimind-ai-service
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-gpt-4}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.7}
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - ./apps/ai-service:/app
      - ai_cache:/app/.cache
      - ./storage/temp:/tmp/omnimind
    networks:
      - omnimind-network
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 3002 --reload

  rust-worker:
    build:
      context: .
      dockerfile: apps/rust-worker/Dockerfile
    container_name: omnimind-rust-worker
    restart: unless-stopped
    environment:
      - RUST_LOG=info
      - REDIS_URL=${REDIS_URL}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
    volumes:
      - ./apps/rust-worker:/app
      - video_uploads:/tmp/omnimind
    networks:
      - omnimind-network
    command: cargo run --release

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: omnimind-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://api:3001
      - NEXT_PUBLIC_WS_URL=ws://api:3001
    depends_on:
      - api
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    networks:
      - omnimind-network
    command: pnpm run dev

  # Monitoring (Optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: omnimind-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - omnimind-network

  grafana:
    image: grafana/grafana:latest
    container_name: omnimind-grafana
    restart: unless-stopped
    ports:
      - "3004:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./infrastructure/monitoring/grafana:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    networks:
      - omnimind-network

volumes:
  qdrant_data:
  uploads:
  clips:
  ai_cache:
  video_uploads:
  prometheus_data:
  grafana_data:

networks:
  omnimind-network:
    driver: bridge