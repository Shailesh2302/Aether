apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      queryTimeout: "60s"

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      maxLines: 1000
      derivedFields:
        - name: traceid
          matcherRegex: "trace_id=(\\w+)"
          url: "$${__field.value}"

  - name: PostgreSQL
    type: postgres
    access: proxy
    url: postgres:5432
    database: omnimind
    user: omnimind
    editable: false
    jsonData:
      sslmode: "disable"
      timescaledb: false